<!--
  InsightsAndAlertsWindow
  - Title row with refresh
  - Description row
  - Context filter row (All, Potential, Lead, Account, Opportunity, To-Do)
  - Insights list with expandable sections
  Project rules: no inline expressions/concatenation/function calls in template attributes or text nodes.
-->
<template>
  <div class="round-border main-container">
    <!-- Title Row -->
    <div class="slds-grid slds-grid_align-spread header-row">
      <header class="slds-media slds-media_center slds-has-flexi-truncate">
        <div class="slds-media__body">
          <h1 class="slds-card__header-title slds-truncate" title="Intelligent Alerts">
            Intelligent Alerts
          </h1>
        </div>
      </header>
      <div class="slds-no-flex">
        <lightning-button-icon
          icon-name="utility:refresh"
          alternative-text="Refresh"
          variant="border-filled"
          onclick={handleRefresh}
        >
        </lightning-button-icon>
      </div>
    </div>

    <!-- Description Row -->
    <div class="slds-text-body_small slds-text-color_weak sub-header-row">
      <p>Today's Priorities & Insights</p>
    </div>

    <!-- Context Filter Row -->
    <div class="filter-buttons-row">
      <button
        type="button"
        class={allButtonClass}
        onclick={handleFilterAll}
      >
        All
      </button>
      <button
        type="button"
        class={potentialButtonClass}
        onclick={handleFilterPotential}
      >
        Potentials
      </button>
      <button
        type="button"
        class={leadButtonClass}
        onclick={handleFilterLead}
      >
        Leads
      </button>
      <button
        type="button"
        class={accountButtonClass}
        onclick={handleFilterAccount}
      >
        Accounts
      </button>
      <button
        type="button"
        class={opportunityButtonClass}
        onclick={handleFilterOpportunity}
      >
        Opportunities
      </button>
      <button
        type="button"
        class={todoButtonClass}
        onclick={handleFilterTodo}
      >
        To-Do
      </button>
    </div>

    <!-- Insights List -->
    <div class="insights-list">
      <template if:true={hasData}>
        <template for:each={filteredInsights} for:item="ins">
          <section key={ins.id} class="insight-section round-border">
            <!-- Collapsed header area (always visible) -->
            <div class="slds-grid slds-grid_align-spread expand-toggle" data-id={ins.id} onclick={toggleExpand}>
              <lightning-icon icon-name="utility:chevrondown" size="x-small" class={ins.chevronClass}></lightning-icon>
              <div class="slds-col slds-truncate insight-info-section">
                <div class="slds-text-heading_small slds-truncate insight-title" title={ins.topic}>
                  {ins.topic}
                </div>
              </div>
              <div class="slds-col slds-grid slds-grid_vertical-align-center slds-grid_align-end">
                <!-- Context Badge -->
                <span class={ins.badgeFullClass}>{ins.context}</span>
                <!-- Completed Checkbox -->
                
                <!-- Icon Checkmark
                <lightning-icon icon-name="utility:check" variant="inverse" size="small" class={checkClass}></lightning-icon>
                -->
                
                <lightning-input
                  type="checkbox"
                  variant="label-hidden"
                  checked={ins.completed}
                  data-id={ins.id}
                  message-when-bad-input="Unable to update"
                  onchange={handleCompletedToggle}
                ></lightning-input>
              </div>
            </div>

            <!-- Expanded area -->
            <template if:true={ins.isExpanded}>
              <div class="detail-section">
                <c-insight-detail-section
                  record-id={ins.id}
                  topic={ins.topic}
                  context={ins.context}
                  details={ins.details}
                  rationale={ins.rationale}
                  suggested-action={ins.suggestedAction}
                  open-record-url={ins.openRecordUrl}
                  expanded={ins.isDetailsExpanded}
                  oncollapse={handleChildCollapse}
                ></c-insight-detail-section>
              </div>
            </template>
          </section>
        </template>
      </template>
      <template if:false={hasData}>
        <div class="slds-text-align_center slds-p-vertical_large slds-text-color_weak">
          No insights to display.
        </div>
      </template>
    </div>
  </div>
</template>
